<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <title>Миграция v3</title>
  <style>
    body { background:#000; color:#fff; font-family:-apple-system,sans-serif; padding:30px; max-width:500px; margin:0 auto; }
    h2 { color:#65d48b; }
    .btn { width:100%;padding:15px;border-radius:12px;border:none;background:#65d48b;color:#000;font-size:16px;font-weight:bold;cursor:pointer;margin-top:12px; }
    .btn:disabled { background:#333;color:#666;cursor:not-allowed; }
    .log { margin-top:20px;background:#111;border-radius:10px;padding:14px;font-size:13px;line-height:1.8;max-height:400px;overflow-y:auto; }
    .ok{color:#65d48b;}.err{color:#ff6b6b;}.info{color:#ffd166;}
    input{width:100%;padding:12px;border-radius:10px;border:1px solid #222;background:#111;color:#fff;font-size:15px;box-sizing:border-box;margin-bottom:10px;}
  </style>
</head>
<body>
  <h2>🔄 Умная миграция</h2>
  <p style="color:#888;font-size:13px;">Переносит только уникальные записи, дубли пропускает.</p>

  <div id="authBlock">
    <input id="email" type="email" placeholder="Email"/>
    <input id="pass" type="password" placeholder="Пароль"/>
    <button class="btn" onclick="doLogin()">Войти</button>
  </div>

  <div id="actions" style="display:none;">
    <button class="btn" onclick="smartMigrate()">🚀 Запустить умную миграцию</button>
  </div>
  <div class="log" id="log" style="display:none;"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const app = initializeApp({
      apiKey: "AIzaSyBYvSsrzjgkrBwhaBAt0KlCGrAtzgOPYx8",
      authDomain: "moneytracker-5335b.firebaseapp.com",
      projectId: "moneytracker-5335b",
      storageBucket: "moneytracker-5335b.firebasestorage.app",
      messagingSenderId: "440589448883",
      appId: "1:440589448883:web:5ad507b270fa414731a2c6"
    });
    const db = getFirestore(app);
    const auth = getAuth(app);

    function log(msg, cls='') {
      const el = document.getElementById('log');
      el.style.display = 'block';
      el.innerHTML += `<div class="${cls}">${msg}</div>`;
      el.scrollTop = el.scrollHeight;
    }

    window.doLogin = async () => {
      try {
        await signInWithEmailAndPassword(auth,
          document.getElementById('email').value.trim(),
          document.getElementById('pass').value.trim()
        );
      } catch(e) { alert('Ошибка: ' + e.message); }
    };

    auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById('authBlock').style.display = 'none';
        document.getElementById('actions').style.display = 'block';
        log(`✅ Вошёл: ${user.email}`, 'ok');
      }
    });

    // Создаём уникальный ключ для записи чтобы определять дубли
    function txKey(d) {
      return [d.type, d.amount, d.date, d.categoryName, d.account, d.createdAt].join('|');
    }
    function setKey(d) {
      return [d.type, d.name, d.catType].join('|');
    }

    window.smartMigrate = async () => {
      const btn = document.querySelector('.btn');
      btn.disabled = true;
      btn.textContent = 'Идёт миграция...';
      const uid = auth.currentUser.uid;

      try {
        // ── ТРАНЗАКЦИИ ──────────────────────────────────────────────
        log('📦 Читаю старые транзакции...', 'info');
        const oldTx = await getDocs(collection(db, 'transactions'));
        log(`Старых транзакций: ${oldTx.size}`, 'info');

        log('📦 Читаю текущие транзакции пользователя...', 'info');
        const newTx = await getDocs(collection(db, 'users', uid, 'transactions'));
        log(`Текущих транзакций: ${newTx.size}`, 'info');

        // Собираем ключи уже перенесённых
        const existingTxKeys = new Set();
        newTx.forEach(d => existingTxKeys.add(txKey(d.data())));

        // Также находим и удаляем дубли внутри текущих
        log('🔍 Ищу дубли в текущих данных...', 'info');
        const seenKeys = new Set();
        let dupCount = 0;
        for (const d of newTx.docs) {
          const k = txKey(d.data());
          if (seenKeys.has(k)) {
            await deleteDoc(doc(db, 'users', uid, 'transactions', d.id));
            dupCount++;
          } else {
            seenKeys.add(k);
          }
        }
        if (dupCount > 0) log(`🗑️ Удалено дублей: ${dupCount}`, 'info');

        // Переносим только те которых ещё нет
        let added = 0, skipped = 0;
        for (const d of oldTx.docs) {
          const data = d.data();
          const k = txKey(data);
          if (seenKeys.has(k)) {
            skipped++;
          } else {
            await addDoc(collection(db, 'users', uid, 'transactions'), data);
            seenKeys.add(k);
            added++;
          }
        }
        log(`✅ Транзакций добавлено: ${added}, пропущено дублей: ${skipped}`, 'ok');

        // ── НАСТРОЙКИ ───────────────────────────────────────────────
        log('⚙️ Читаю старые настройки...', 'info');
        const oldSet = await getDocs(collection(db, 'settings'));
        log(`Старых настроек: ${oldSet.size}`, 'info');

        const newSet = await getDocs(collection(db, 'users', uid, 'settings'));

        // Удаляем дубли в текущих настройках
        const seenSetKeys = new Set();
        let setDups = 0;
        for (const d of newSet.docs) {
          const k = setKey(d.data());
          if (seenSetKeys.has(k)) {
            await deleteDoc(doc(db, 'users', uid, 'settings', d.id));
            setDups++;
          } else {
            seenSetKeys.add(k);
          }
        }
        if (setDups > 0) log(`🗑️ Удалено дублей настроек: ${setDups}`, 'info');

        let setAdded = 0, setSkipped = 0;
        for (const d of oldSet.docs) {
          const data = d.data();
          const k = setKey(data);
          if (seenSetKeys.has(k)) {
            setSkipped++;
          } else {
            await addDoc(collection(db, 'users', uid, 'settings'), data);
            seenSetKeys.add(k);
            setAdded++;
          }
        }
        log(`✅ Настроек добавлено: ${setAdded}, пропущено: ${setSkipped}`, 'ok');

        log('🎉 Готово! Открывай приложение.', 'ok');
        btn.textContent = '✅ Миграция завершена';
      } catch(e) {
        log('❌ Ошибка: ' + e.message, 'err');
        btn.disabled = false;
        btn.textContent = 'Попробовать снова';
      }
    };
  </script>
</body>
</html>
