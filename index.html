<script>
// ══════════════════════════════════════════════
// ИИ АГЕНТ v2 — Полный доступ + Авто-исполнение
// ══════════════════════════════════════════════
let aiHistory = [];
let currentProvider = 'gemini';

window.selectProvider = (p) => {
  currentProvider = p;
  ['gemini','claude','openai'].forEach(x => {
    const btn=document.getElementById('provBtn-'+x), setup=document.getElementById('provSetup-'+x), active=x===p;
    btn.style.opacity=active?'1':'0.4';
    btn.style.borderColor=active?(x==='gemini'?'#4a9eff':x==='claude'?'#c084fc':'#65d48b'):'#2a2a2a';
    if(setup)setup.style.display=active?'block':'none';
  });
};

window.loadAiModels = async () => {
  const key=document.getElementById('keyInput-gemini').value.trim();
  if(!key){window.showToast('Введи ключ Gemini');return;}
  const btn=document.getElementById('loadModelsBtn');
  btn.textContent='⏳ Загружаю...'; btn.disabled=true;
  try {
    const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    const models=(data.models||[]).filter(m=>(m.supportedGenerationMethods||[]).includes('generateContent'));
    const sel=document.getElementById('aiModelSelect');
    const saved=localStorage.getItem('geminiModel')||'';
    sel.innerHTML=models.map(m=>{const id=m.name.replace('models/','');return`<option value="${id}" ${id===saved?'selected':''}>${m.displayName||id}</option>`;}).join('');
    sel.style.display='block';
    btn.textContent=`✅ ${models.length} моделей`;
  } catch(e){btn.textContent='❌ '+e.message;}
  btn.disabled=false;
};

window.saveAiSettings = () => {
  const p=currentProvider;
  if(p==='gemini'){const key=document.getElementById('keyInput-gemini').value.trim(),sel=document.getElementById('aiModelSelect');if(!key){window.showToast('Введи ключ Gemini');return;}if(!sel.value){window.showToast('Загрузи и выбери модель');return;}localStorage.setItem('geminiKey',key);localStorage.setItem('geminiModel',sel.value);}
  else if(p==='claude'){const key=document.getElementById('keyInput-claude').value.trim();if(!key){window.showToast('Введи ключ Claude');return;}localStorage.setItem('claudeKey',key);localStorage.setItem('claudeModel',document.getElementById('modelSelect-claude').value);}
  else if(p==='openai'){const key=document.getElementById('keyInput-openai').value.trim();if(!key){window.showToast('Введи ключ OpenAI');return;}localStorage.setItem('openaiKey',key);localStorage.setItem('openaiModel',document.getElementById('modelSelect-openai').value);}
  localStorage.setItem('aiProvider',p);
  document.getElementById('aiKeySetup').style.display='none';
  const names={gemini:'Gemini 🔵',claude:'Claude 🟣',openai:'OpenAI 🟢'};
  showAgentStatus(names[p]);
  if(!aiHistory.length)greetAgent();
};

window.resetAiKey = () => {
  document.getElementById('aiKeySetup').style.display='block';
  document.getElementById('aiAgentStatus').style.display='none';
  const p=localStorage.getItem('aiProvider')||'gemini'; selectProvider(p);
  const gk=localStorage.getItem('geminiKey');if(gk)document.getElementById('keyInput-gemini').value=gk;
  const ck=localStorage.getItem('claudeKey');if(ck)document.getElementById('keyInput-claude').value=ck;
  const ok=localStorage.getItem('openaiKey');if(ok)document.getElementById('keyInput-openai').value=ok;
  const cm=localStorage.getItem('claudeModel');if(cm)document.getElementById('modelSelect-claude').value=cm;
  const om=localStorage.getItem('openaiModel');if(om)document.getElementById('modelSelect-openai').value=om;
};

function showAgentStatus(name) {
  document.getElementById('aiAgentStatus').style.display='flex';
  document.getElementById('aiStatusText').textContent=`🟢 Агент: ${name} | Авто-режим`;
}

// ── УЛУЧSHENNY КОНТЕКСТ ДЛЯ ПОЛНОГО ДОСТУПА ──
function buildContext() {
  const tx = window.allTx || [];
  const today = (() => { const n=new Date(); if(n.getHours()<3)n.setDate(n.getDate()-1); return new Date(n-n.getTimezoneOffset()*60000).toISOString().split('T')[0]; })();
  const month = today.slice(0,7);
  const accounts = window.ACCOUNTS || [];
  const defCat = window.DEFAULTS || {income:[], expense:[]};

  // Базовая статистика
  const allInc = tx.filter(t=>t.type==='income'&&!t.subcategory?.startsWith('← ')&&!t.subcategory?.startsWith('→ '));
  const allExp = tx.filter(t=>t.type==='expense'&&!t.subcategory?.startsWith('← ')&&!t.subcategory?.startsWith('→ '));
  const totalInc = allInc.reduce((s,t)=>s+t.amount,0);
  const totalExp = allExp.reduce((s,t)=>s+t.amount,0);

  const todayInc = allInc.filter(t=>t.date===today).reduce((s,t)=>s+t.amount,0);
  const todayExp = allExp.filter(t=>t.date===today).reduce((s,t)=>s+t.amount,0);
  const monthInc = allInc.filter(t=>(t.date||'').startsWith(month)).reduce((s,t)=>s+t.amount,0);
  const monthExp = allExp.filter(t=>(t.date||'').startsWith(month)).reduce((s,t)=>s+t.amount,0);

  // Счета (с ID для точного доступа)
  const accList = accounts.map(a=>`  💳 [id:${a.id}] ${a.name} (нач. ${a.initialBalance||0}₸)`).join('\n');
  const nalichId = accounts.find(a=>a.name.toLowerCase().includes('налич'))?.id || '';

  // Депозиты
  const DEP_START = '2026-03-19';
  const DEP_RATES = [0.10, 0.20, 0.20];
  const DEP_NAMES_DEP = ['0:Будущее', '1:День рождения', '2:Авто'];
  const byDayDep = {};
  allInc.forEach(t=>{if(!t.date||t.date<DEP_START)return;byDayDep[t.date]=(byDayDep[t.date]||0)+t.amount;});
  const depManual = tx.filter(t=>t.type==='dep_manual');
  let totalDep = 0;
  const depStats = DEP_NAMES_DEP.map((item,i)=>{
    const [idx, name] = item.split(':');
    const auto=Object.values(byDayDep).reduce((s,v)=>s+Math.round(v*DEP_RATES[i]),0);
    const manual=depManual.filter(t=>String(t.depIndex)===idx).reduce((s,t)=>s+t.amount,0);
    const total=auto+manual; totalDep+=total;
    return `  🏦 [depIndex:${idx}] ${name}: ${total.toLocaleString()}₸ (авто: ${auto.toLocaleString()}₸)`;
  }).join('\n');

  // Последние 40 записей (расширено для точного удаления/правки)
  const last40=[...tx].filter(t=>t.type!=='dep_manual').sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)).slice(0,40)
    .map(t=>`  📝 [id:${t.id}] ${t.date} ${t.type.toUpperCase()} ${t.amount}₸ | ${t.subcategory||t.categoryName} | ${t.account} | 💬 ${t.comment||'-'}`).join('\n');

  // Доступные категории
  const incCats = defCat.income.map(c=>`${c.name}${c.sub?.length?'['+c.sub.join(',')+']':''}`).join(', ')||'нет';
  const expCats = defCat.expense.map(c=>`${c.name}${c.sub?.length?'['+c.sub.join(',')+']':''}`).join(', ')||'нет';

  return `═══ ПОЛНЫЙ КОНТЕКСТ БАЗЫ (${today}) ═══
Сегодня: +${todayInc.toLocaleString()}₸ / -${todayExp.toLocaleString()}₸ | Чистая: ${(todayInc-todayExp).toLocaleString()}₸
Месяц: +${monthInc.toLocaleString()}₸ / -${monthExp.toLocaleString()}₸ | Всего записей: ${tx.length}

💳 СЧЕТА (id для привязки):
${accList||'  нет счетов'}

🏦 ДЕПОЗИТЫ (авто-отчисления от дохода):
${depStats}
Всего отложено: ${totalDep.toLocaleString()}₸

🗂️ КАТЕГОРИИ:
Приход: ${incCats}
Расход: ${expCats}

📋 ПОСЛЕДНИЕ 40 ОПЕРАЦИЙ (id обязателен для удаления/правки):
${last40||'  пусто'}

⚡ ПРАВИЛА ИСПОЛНЕНИЯ:
1. Всегда используй инструменты сразу, без уточнений.
2. Если нужно несколько действий — вызывай их последовательно.
3. Даты в формате YYYY-MM-DD. Если не указано — используй ${today}.
4. Счета привязывай по name или id.
5. При ответах пиши кратко: что сделал, итог, цифры.`;
}

// ─── ОПРЕДЕЛЕНИЯ ИНСТРУМЕНТОВ ───
const TOOLS_DEF = [
  {name:'add_transaction',desc:'Записать доход/расход',req:['type','amount','categoryName'],fields:{type:'income|expense',amount:'number',categoryName:'string',subcategory:'string|null',account:'string|null',comment:'string|null',date:'YYYY-MM-DD|null'}},
  {name:'update_transaction',desc:'Изменить запись по id',req:['id'],fields:{id:'string',amount:'number|null',categoryName:'string|null',subcategory:'string|null',account:'string|null',comment:'string|null',date:'YYYY-MM-DD|null'}},
  {name:'delete_transaction',desc:'Удалить запись по id',req:['id'],fields:{id:'string'}},
  {name:'batch_delete_transactions',desc:'Удалить записи по фильтру',req:['type'],fields:{type:'income|expense|transfer',dateFrom:'YYYY-MM-DD|null',dateTo:'YYYY-MM-DD|null',categoryName:'string|null',max:'number(по умолч 10)'}},
  {name:'transfer_funds',desc:'Перевод между счетами',req:['from','to','amount'],fields:{from:'account name',to:'account name',amount:'number',date:'YYYY-MM-DD|null',comment:'string|null'}},
  {name:'modify_deposit',desc:'Снять/пополнить депозит',req:['depIndex','action','amount'],fields:{depIndex:'0|1|2',action:'topup|withdraw',amount:'number',comment:'string|null'}},
  {name:'add_category',desc:'Создать категорию',req:['name','catType'],fields:{name:'string',catType:'income|expense'}},
  {name:'add_account',desc:'Создать счёт',req:['name'],fields:{name:'string',initialBalance:'number|null'}},
  {name:'get_stats',desc:'Статистика за период',req:['period'],fields:{period:'today|yesterday|week|month|all|YYYY-MM-DD'}}
];

// Конвертер схем под провайдеров
function schemaGemini() { return {functionDeclarations:TOOLS_DEF.map(t=>({name:t.name,description:t.desc,parameters:{type:'OBJECT',properties:Object.fromEntries(t.fields.map(f=>[f[0],{type:f[1].includes('number')?'NUMBER':'STRING',description:f[1].includes('string')?t.req.includes(f[0])?f[0]:f[1]:'число'}])),required:t.req}}))}; }

function schemaClaude() { return TOOLS_DEF.map(t=>({name:t.name,description:t.desc,input_schema:{type:'object',properties:Object.fromEntries(t.fields.map(f=>[f[0],{type:f[1].includes('number')?'number':'string'}])),required:t.req}})); }

function schemaOpenAI() { return TOOLS_DEF.map(t=>({type:'function',function:{name:t.name,description:t.desc,parameters:{type:'object',properties:Object.fromEntries(t.fields.map(f=>[f[0],{type:f[1].includes('number')?'number':'string'}])),required:t.req}}})); }

// ─── ВЫПОЛНЕНИЕ ИНСТРУМЕНТОВ ───
async function executeTool(name, args) {
  const { fbDB, fbMethods, fbUser } = window;
  const uid = fbUser?.uid; if(!uid) return '❌ Нет авторизации';
  const today = (() => { const n=new Date(); if(n.getHours()<3)n.setDate(n.getDate()-1); return new Date(n-n.getTimezoneOffset()*60000).toISOString().split('T')[0]; })();
  const time = new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  const txRef = fbMethods.collection(fbDB,'users',uid,'transactions');

  try {
    if(name==='add_transaction'){
      const acc = args.account || (window.ACCOUNTS||[]).find(a=>a.name.toLowerCase().includes('налич'))?.name || 'Наличные';
      await fbMethods.addDoc(txRef, {type:args.type,amount:Number(args.amount),categoryName:args.categoryName,subcategory:args.subcategory||'',account:acc,date:args.date||today,time,comment:args.comment||'(AI)',createdAt:Date.now()});
      return `✅ +${args.type==='income'?'+':'−'}${Number(args.amount).toLocaleString()}₸ → ${args.categoryName} (${args.date||today})`;
    }
    if(name==='update_transaction'){
      const tx = (window.allTx||[]).find(t=>t.id===args.id);
      if(!tx) return '❌ Запись не найдена';
      const upd = {};
      if(args.amount) upd.amount = Number(args.amount);
      if(args.categoryName) upd.categoryName = args.categoryName;
      if(args.subcategory!==undefined) upd.subcategory = args.subcategory;
      if(args.account) upd.account = args.account;
      if(args.comment!==undefined) upd.comment = args.comment;
      if(args.date) upd.date = args.date;
      if(Object.keys(upd).length>0) await fbMethods.updateDoc(fbMethods.doc(fbDB,'users',uid,'transactions',args.id), upd);
      return `✅ Обновлено: [${args.id}]`;
    }
    if(name==='delete_transaction'){
      const tx = (window.allTx||[]).find(t=>t.id===args.id||(args.id==='last'&&t.id===(window.allTx||[]).filter(t2=>t2.type!=='dep_manual').sort((a,b)=>(b.createdAt||0)-(a.createdAt||0))[0]?.id));
      if(!tx) return '❌ Не найдено';
      await fbMethods.deleteDoc(fbMethods.doc(fbDB,'users',uid,'transactions',tx.id));
      return `✅ Удалено: ${tx.date} ${tx.amount}₸`;
    }
    if(name==='batch_delete_transactions'){
      let list=(window.allTx||[]).filter(t=>t.type===args.type);
      if(args.dateFrom) list=list.filter(t=>t.date>=args.dateFrom);
      if(args.dateTo) list=list.filter(t=>t.date<=args.dateTo);
      if(args.categoryName) list=list.filter(t=>(t.categoryName||'').toLowerCase().includes(args.categoryName.toLowerCase()));
      const max=args.max||10;
      const toDel=list.slice(0,max);
      if(!toDel.length) return '⚠️ Ничего не найдено';
      await Promise.all(toDel.map(t=>fbMethods.deleteDoc(fbMethods.doc(fbDB,'users',uid,'transactions',t.id))));
      return `✅ Удалено записей: ${toDel.length} (макс ${max})`;
    }
    if(name==='transfer_funds'){
      if(args.from===args.to) return '❌ Счета совпадают';
      await fbMethods.addDoc(txRef,{type:'transfer',amount:Number(args.amount),fromAccount:args.from,toAccount:args.to,account:args.from,categoryName:`Перевод → ${args.to}`,subcategory:'',date:args.date||today,time,comment:args.comment||`AI: ${args.from}→${args.to}`,createdAt:Date.now()});
      return `✅ Переведено ${Number(args.amount).toLocaleString()}₸: ${args.from} → ${args.to}`;
    }
    if(name==='modify_deposit'){
      const amt=Number(args.amount), isW=args.action==='withdraw', finalAmt=isW?-amt:amt;
      await fbMethods.addDoc(txRef,{type:'dep_manual',depIndex:Number(args.depIndex),amount:finalAmt,date:today,time,comment:args.comment||`AI ${args.action}`,createdAt:Date.now()});
      // Корректировка наличных
      const nalichAcc=(window.ACCOUNTS||[]).find(a=>a.name.toLowerCase().includes('налич'));
      if(nalichAcc){
        const names=['Будущее','День рождения','Авто'];
        await fbMethods.addDoc(txRef,{type:isW?'income':'expense',amount:amt,categoryName:'Депозит',subcategory:(isW?'← ':'→ ')+names[args.depIndex],account:nalichAcc.name,date:today,time,comment:args.comment||`AI ${args.action} депозит`,createdAt:Date.now()+1});
      }
      return `✅ Депозит ${args.depIndex}: ${isW?'-':'+'}${amt.toLocaleString()}₸`;
    }
    if(name==='add_category'){
      await fbMethods.addDoc(fbMethods.collection(fbDB,'users',uid,'settings'),{type:'category',name:args.name,catType:args.catType,sub:[]});
      return `✅ Категория добавлена: ${args.name}`;
    }
    if(name==='add_account'){
      await fbMethods.addDoc(fbMethods.collection(fbDB,'users',uid,'settings'),{type:'account',name:args.name,initialBalance:Number(args.initialBalance)||0});
      return `✅ Счёт добавлен: ${args.name}`;
    }
    if(name==='get_stats'){
      let list=window.allTx||[];
      const now=new Date();
      if(args.period==='today') list=list.filter(t=>t.date===today);
      else if(args.period==='yesterday'){const y=new Date(now);y.setDate(y.getDate()-1);const ys=y.toISOString().split('T')[0];list=list.filter(t=>t.date===ys);}
      else if(args.period==='week'){const w=new Date(now-7*864e5);const ws=w.toISOString().split('T')[0];list=list.filter(t=>t.date>=ws);}
      else if(args.period==='month') list=list.filter(t=>(t.date||'').startsWith(today.slice(0,7)));
      const inc=list.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
      const exp=list.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
      const tr=list.filter(t=>t.type==='transfer').reduce((s,t)=>s+t.amount,0);
      return `📊 ${args.period}: Доход ${inc.toLocaleString()}₸ | Расход ${exp.toLocaleString()}₸ | Переводы ${tr.toLocaleString()}₸ | Записей ${list.length}`;
    }
    return `✅ Выполнено`;
  } catch(e){return `❌ Ошибка: ${e.message}`;}
}

// ─── UI ЧАТА ───
function appendAiMsg(role, text) {
  const el=document.getElementById('aiMessages'), div=document.createElement('div');
  div.className=`ai-msg ${role}`; div.textContent=text; el.appendChild(div);
  setTimeout(()=>el.scrollTop=el.scrollHeight,50); return div;
}
function greetAgent() {
  const p=localStorage.getItem('aiProvider')||'gemini';
  appendAiMsg('bot',`🤖 Агент активен. Полный доступ включен.\nМогу: записывать, править, удалять, переводить, управлять депозитами, считать статистику.\nПиши команды на русском.`);
}

window.sendAiMsg = async () => {
  const input=document.getElementById('aiInput'), text=input.value.trim();
  if(!text) return;
  const provider=localStorage.getItem('aiProvider');
  if(!provider){window.showToast('Сначала настрой агента');return;}
  input.value='';
  appendAiMsg('user',text);
  const typing=appendAiMsg('bot','...'); typing.classList.add('typing');

  const context=buildContext();
  const sys=`Ты авто-агент "Учёт Курьера Pro". Контекст:\n${context}\n\nПРАВИЛА:\n1. Выполняй запрос сразу. Не спрашивай подтверждения.\n2. Если нужно несколько шагов — вызывай инструменты последовательно.\n3. Отвечай кратко: результат, цифры, что изменилось.\n4. При ошибках пиши суть проблемы.`;

  try {
    let reply='';
    if(provider==='gemini') reply=await sendGemini(sys,text,typing);
    else if(provider==='claude') reply=await sendClaude(sys,text,typing);
    else if(provider==='openai') reply=await sendOpenAI(sys,text,typing);
    typing.textContent=reply; typing.classList.remove('typing');
    aiHistory.push({role:'user',content:text}, {role:'assistant',content:reply});
    if(aiHistory.length>25) aiHistory=aiHistory.slice(-25);
  } catch(e){typing.textContent=`❌ ${e.message}`;typing.classList.remove('typing');}
};

async function sendGemini(sys,text,typing){
  const k=localStorage.getItem('geminiKey'),m=localStorage.getItem('geminiModel')||'gemini-2.0-flash';
  if(!k)throw new Error('Нет ключа');
  const cont=[...aiHistory.map(x=>({role:x.role==='assistant'?'model':'user',parts:[{text:x.content}]})),{role:'user',parts:[{text}]}];
  let r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent?key=${k}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system_instruction:{parts:[{text:sys}]},contents:cont,tools:[schemaGemini()]})});
  let d=await r.json(); if(d.error)throw new Error(d.error.message);
  const part=d.candidates?.[0]?.content?.parts?.[0];
  if(part?.functionCall){
    typing.textContent=`⚙️ ${part.functionCall.name}...`;
    const res=await executeTool(part.functionCall.name,part.functionCall.args);
    cont.push({role:'model',parts:[{functionCall:part.functionCall}]});
    cont.push({role:'user',parts:[{functionResponse:{name:part.functionCall.name,response:{result:res}}}]});
    r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent?key=${k}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system_instruction:{parts:[{text:sys}]},contents:cont,tools:[schemaGemini()]})});
    d=await r.json(); if(d.error)throw new Error(d.error.message);
  }
  return d.candidates?.[0]?.content?.parts?.[0]?.text||'✅ Готово';
}

async function sendClaude(sys,text,typing){
  const k=localStorage.getItem('claudeKey'),m=localStorage.getItem('claudeModel')||'claude-3-5-haiku-latest';
  if(!k)throw new Error('Нет ключа');
  const tools=schemaClaude();
  const msg=[...aiHistory.map(x=>({role:x.role==='assistant'?'assistant':'user',content:x.content})),{role:'user',content:text}];
  let r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:m,max_tokens:1024,system:sys,tools,messages:msg})});
  let d=await r.json(); if(d.error)throw new Error(d.error.message||d.error);
  if(d.stop_reason==='tool_use'){
    const t=d.content.find(b=>b.type==='tool_use');
    typing.textContent=`⚙️ ${t.name}...`;
    const res=await executeTool(t.name,t.input);
    msg.push({role:'assistant',content:d.content});
    msg.push({role:'user',content:[{type:'tool_result',tool_use_id:t.id,content:res}]});
    r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:m,max_tokens:1024,system:sys,tools,messages:msg})});
    d=await r.json(); if(d.error)throw new Error(d.error.message||d.error);
  }
  return d.content?.find(b=>b.type==='text')?.text||'✅ Готово';
}

async function sendOpenAI(sys,text,typing){
  const k=localStorage.getItem('openaiKey'),m=localStorage.getItem('openaiModel')||'gpt-4o-mini';
  if(!k)throw new Error('Нет ключа');
  const tools=schemaOpenAI();
  const msg=[{role:'system',content:sys},...aiHistory.map(x=>({role:x.role==='assistant'?'assistant':'user',content:x.content})),{role:'user',content:text}];
  let r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+k},body:JSON.stringify({model:m,messages:msg,tools,tool_choice:'auto',max_tokens:800})});
  let d=await r.json(); if(d.error)throw new Error(d.error.message);
  const m1=d.choices?.[0]?.message;
  if(m1?.tool_calls?.length){
    const tc=m1.tool_calls[0]; typing.textContent=`⚙️ ${tc.function.name}...`;
    const res=await executeTool(tc.function.name,JSON.parse(tc.function.arguments));
    msg.push(m1); msg.push({role:'tool',tool_call_id:tc.id,content:res});
    r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+k},body:JSON.stringify({model:m,messages:msg,tools,max_tokens:800})});
    d=await r.json(); if(d.error)throw new Error(d.error.message);
  }
  return d.choices?.[0]?.message?.content||'✅ Готово';
}

// Инициализация вкладки
const origSwitch=window.switchTab;
window.switchTab=(tab)=>{
  if(origSwitch)origSwitch(tab);
  const bar=document.getElementById('aiInputBar');
  if(bar)bar.style.display=tab==='ai'?'block':'none';
  if(tab==='ai'){
    const p=localStorage.getItem('aiProvider');
    if(p)selectProvider(p);
    const hasKey=(p==='gemini'&&localStorage.getItem('geminiKey'))||(p==='claude'&&localStorage.getItem('claudeKey'))||(p==='openai'&&localStorage.getItem('openaiKey'));
    if(hasKey){document.getElementById('aiKeySetup').style.display='none';showAgentStatus(p);if(!aiHistory.length)greetAgent();}
  }
};
