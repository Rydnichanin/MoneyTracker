<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Вход</title>
  <style>
    body { background: #000; color: #fff; font-family: -apple-system, sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; margin: 0; text-align: center; padding: 20px; box-sizing: border-box; }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h2 { margin: 0 0 8px; font-size: 20px; }
    p { color: #555; font-size: 14px; margin: 0 0 32px; }
    button {
      display: flex; align-items: center; gap: 12px;
      background: #fff; color: #000; border: none; border-radius: 14px;
      padding: 15px 28px; font-size: 16px; font-weight: bold; cursor: pointer;
    }
    .status { margin-top: 24px; font-size: 13px; color: #555; }
    .error { color: #ff6b6b; }
  </style>
</head>
<body>
  <div class="icon">🔐</div>
  <h2>Вход в аккаунт</h2>
  <p>Войдите через Google чтобы продолжить</p>
  <button id="loginBtn" onclick="doLogin()">
    <svg width="20" height="20" viewBox="0 0 48 48">
      <path fill="#4285F4" d="M44.5 20H24v8.5h11.8C34.7 33.9 29.8 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 5.1 29.6 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21c10.5 0 20-7.6 20-21 0-1.4-.1-2.7-.5-4z"/>
    </svg>
    Войти через Google
  </button>
  <div class="status" id="status"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const app = initializeApp({
      apiKey: "AIzaSyBYvSsrzjgkrBwhaBAt0KlCGrAtzgOPYx8",
      authDomain: "moneytracker-5335b.firebaseapp.com",
      projectId: "moneytracker-5335b",
      storageBucket: "moneytracker-5335b.firebasestorage.app",
      messagingSenderId: "440589448883",
      appId: "1:440589448883:web:5ad507b270fa414731a2c6"
    });

    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    window.doLogin = async () => {
      const btn = document.getElementById("loginBtn");
      const status = document.getElementById("status");
      btn.disabled = true;
      btn.style.opacity = "0.6";
      status.textContent = "Выполняется вход...";
      status.className = "status";

      try {
        const result = await signInWithPopup(auth, provider);
        const idToken = await result.user.getIdToken();
        const name = encodeURIComponent(result.user.displayName || "");
        const email = encodeURIComponent(result.user.email || "");
        status.textContent = "Успешно! Возврат в приложение...";
        // Передаём токен обратно в APK через deep link
        // Сохраняем токен в sessionStorage как запасной вариант
        try { sessionStorage.setItem("pendingIdToken", idToken); } catch(e) {}
        window.location.href = `moneytracker://auth?idToken=${encodeURIComponent(idToken)}&name=${name}&email=${email}`;
      } catch (e) {
        console.error(e);
        status.textContent = "Ошибка: " + (e?.message || "Попробуйте снова");
        status.className = "status error";
        btn.disabled = false;
        btn.style.opacity = "1";
      }
    };
  </script>
</body>
</html>
